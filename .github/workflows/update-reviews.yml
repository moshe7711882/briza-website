name: 🔄 עדכון ביקורות גוגל אוטומטי

on:
  schedule:
    # 22:00 UTC corresponds to 00:00 (Midnight) Israel Time
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write # נדרש כדי לאפשר ל-Action לעדכן את הקבצים במאגר

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true # מבטיח שההרשאות יעברו ל-git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch & update reviews
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PLACE_ID: ${{ secrets.PLACE_ID }}
        run: python update_reviews.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html .reviews_cache.json
          # הבדיקה כאן מוודאת שמתבצע קומיט רק אם היו שינויים, ומונעת שגיאות אם אין מה לעדכן
          git diff --cached --quiet || (git commit -m "🔄 עדכון ביקורות גוגל אוטומטי [$(date '+%Y-%m-%d')]" && git push)
